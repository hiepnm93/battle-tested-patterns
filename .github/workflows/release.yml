name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Extract release notes from CHANGELOG.md
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract the section for this version (between ## vX.Y.Z and next ## vX.Y.Z or EOF)
          awk "/^## ${TAG//./\\.}/{found=1; next} /^## v[0-9]/{if(found) exit} found" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No release notes found for ${TAG} in CHANGELOG.md" > release-notes.md
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          generate_release_notes: false
