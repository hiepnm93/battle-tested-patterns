server {
    listen 80;
    server_name github.hetsach.com;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect bare host to the site base path
    location = / {
        return 302 /battle-tested-patterns/;
    }

    # VitePress site lives under the base path
    location /battle-tested-patterns/ {
        try_files $uri $uri/ $uri.html /battle-tested-patterns/404.html;
    }

    # Long-cache fingerprinted assets
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
